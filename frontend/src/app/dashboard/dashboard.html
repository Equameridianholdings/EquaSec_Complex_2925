<div class="dashboard-container">
  <div class="welcome-section">
    <div class="welcome-main">
      <div class="profile-avatar-container">
        <div class="profile-avatar">
          @if (profilePhotoData) {
            <img [src]="profilePhotoData" alt="{{ profileName }}" />
          }
          @if (!profilePhotoData) {
            <span>{{ profileInitials }}</span>
          }
        </div>
        <button
          type="button"
          class="camera-button"
          (click)="triggerCameraInput()"
          title="Take or upload profile photo"
        >
          📷
        </button>
      </div>
      <div class="welcome-text">
        <p class="greeting">{{ greetingLabel }}, {{ profileName }}</p>
        <h1>Hello, Unit 402</h1>
      </div>
    </div>
    <p class="status-badge" [class.active]="true">Account Active</p>
  </div>

  <div class="billing-card alert">
    <div class="alert-icon">�</div>
    <div class="alert-text">Always verify visitor details before sharing access codes.</div>
  </div>

  <div class="action-tiles">
    <button type="button" class="tile-card primary" (click)="openBookingModal()">
      <span class="tile-icon">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
      </span>
      <span class="tile-label">Book Visitor</span>
    </button>
    <button type="button" class="tile-card logout" (click)="logout()">
      <span class="tile-icon">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M3 21V3a2 2 0 0 1 2-2h7a2 2 0 0 1 2 2v4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
      </span>
      <span class="tile-label">Unit Management</span>
    </button>
    <button type="button" class="tile-card logout" (click)="logout()">
      <span class="tile-icon">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M3 21V3a2 2 0 0 1 2-2h7a2 2 0 0 1 2 2v4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
      </span>
      <span class="tile-label">Vehicle Management</span>
    </button>
    <button type="button" class="tile-card secondary" (click)="openUpdateDetailsModal()">
      <span class="tile-icon">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 20h9" />
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19.5 3 21l1.5-4L16.5 3.5z" />
        </svg>
      </span>
      <span class="tile-label">Update Details</span>
    </button>
    <button type="button" class="tile-card secondary" (click)="openChangePinModal()">
      <span class="tile-icon">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="3" y="11" width="18" height="11" rx="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
      </span>
      <span class="tile-label">Change PIN</span>
    </button>
    <button type="button" class="tile-card secondary">
      <span class="tile-icon">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="2" y="5" width="20" height="14" rx="2" />
          <line x1="2" y1="10" x2="22" y2="10" />
        </svg>
      </span>
      <span class="tile-label">Make Payment</span>
    </button>
    <button type="button" class="tile-card secondary">
      <span class="tile-icon">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="5" y1="12" x2="19" y2="12" />
          <polyline points="12 5 19 12 12 19" />
        </svg>
      </span>
      <span class="tile-label">Move Out</span>
    </button>
    <button type="button" class="tile-card logout" (click)="logout()">
      <span class="tile-icon">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M3 21V3a2 2 0 0 1 2-2h7a2 2 0 0 1 2 2v4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
      </span>
      <span class="tile-label">Logout</span>
    </button>
  </div>

  <button
    type="button"
    class="sos-fab"
    [class.holding]="isHoldingSos"
    (mousedown)="startSosHold($event)"
    (touchstart)="startSosHold($event)"
    (mouseup)="endSosHold()"
    (mouseleave)="endSosHold()"
    (touchend)="endSosHold()"
    (touchcancel)="endSosHold()"
    aria-label="Emergency SOS"
  >
    <span class="sos-text">SOS</span>
    <span class="sos-sub">Hold 5s</span>
  </button>

  <!-- use child routing to configure unit and vehicle managment -->
  <app-visitors />

  <div class="moving-out-section">
    <hr />
    <p>© 2026 Equameridian Holdings (Pty) Ltd. All rights reserved.</p>
  </div>
</div>
