@if (submitting()) {
  <app-loader />
}

<div class="section-header">
  <h3>Visitors</h3>
</div>

<div class="grid grid-cols-1 gap-3 p-5 md:grid-cols-2 xl:grid-cols-3">
  @for (visitor of visitors(); track $index) {
    <app-visitor-card [visitor]="visitor" [gaurd]="true"/>
  } @empty {
    <div class="col-span-full">No visitors today!</div>
  }
</div>
