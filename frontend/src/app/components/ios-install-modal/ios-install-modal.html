<div class="ios-install-modal">
  <div class="modal-content">
    <h2>Add EquaSec to Home Screen</h2>
    <ol>
      <li>Open Safari and tap the Share button at the bottom of the screen.</li>
      <li>Scroll down and tap <b>Add to Home Screen</b>.</li>
      <li>Tap <b>Add</b> in the top right corner to finish.</li>
    </ol>
    <button (click)="close()">Close</button>
  </div>
</div>
