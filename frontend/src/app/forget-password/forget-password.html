@if (submitting()) {
  <app-loader />
}
<div class="flex h-dvh w-dvw items-center content-center">
  <div
    class="modal mx-auto w-1/2"
    role="dialog"
    aria-modal="true"
    aria-labelledby="change-pin-title"
    (click)="$event.stopPropagation()"
  >
    <div class="modal-header">
      <h2 id="change-pin-title">Change Access PIN</h2>
    </div>

    <form class="modal-form" #changePinForm (ngSubmit)="saveChanges()">
      <div class="form-group">
        <label for="new-pin-1">New PIN</label>
        <div class="pin-inputs" aria-label="New 6 digit PIN">
          @for (digit of newPassword; track $index) {
            <input
              [id]="'new-pin-' + $index"
              [name]="'new-pin' + $index"
              type="password"
              inputmode="numeric"
              pattern="[0-9]"
              maxlength="1"
              class="pin-box"
              [aria-label]="'new-Digit' + $index"
              [ngModel]=""
              (ngModelChange)="newPassword[$index] = $event"
              (input)="onPinInput($event, $index, 'new')"
              (keydown)="onPinKeydown($event)"
            />
          }
        </div>
      </div>

      <div class="form-group">
        <label for="confirm-pin-1">Confirm PIN</label>
        <div class="pin-inputs" aria-label="Confirm 6 digit PIN">
          @for (digit of confirmPassword; track $index) {
            <input
              [id]="'confirm-pin-' + $index"
              [name]="'confirm-pin' + $index"
              type="password"
              inputmode="numeric"
              pattern="[0-9]"
              maxlength="1"
              class="pin-box"
              [aria-label]="'confirm-Digit' + $index"
              [ngModel]=""
              (ngModelChange)="confirmPassword[$index] = $event"
              (input)="onPinInput($event, $index, 'confirm')"
              (keydown)="onPinKeydown($event)"
            />
          }
        </div>
      </div>

      @if (changePinError) {
        <div class="error-message">{{ changePinError }}</div>
      }
      @if (changePinSuccess) {
        <div class="success-message">{{ changePinSuccess }}</div>
      }

      <div class="modal-actions">
        <button type="submit" class="btn-action btn-action--save">Change PIN</button>
      </div>
    </form>
  </div>
</div>
