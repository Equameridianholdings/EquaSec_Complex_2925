<div class="modal-backdrop" (click)="closeModal()">
  <div
    class="modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="camera-title"
    (click)="$event.stopPropagation()"
  >
    <div class="modal-header">
      <h2 id="camera-title">Capture Profile Photo</h2>
      <button class="btn-icon" type="button" (click)="closeModal()">✕</button>
    </div>

    <div class="modal-body">
      <div class="camera-card">
        <video #profileCameraVideo class="camera-video" autoplay playsinline muted></video>
        <canvas #profileCameraCanvas class="camera-canvas"></canvas>
        @if (profilePhotoData) {
          <img [src]="profilePhotoData" alt="Profile preview" class="camera-preview" />
        }
      </div>
      <div class="camera-actions">
        <button
          type="button"
          class="btn-secondary"
          (click)="startProfileCamera()"
          [disabled]="hasCameraStream"
        >
          Start Camera
        </button>
        <button
          type="button"
          class="btn-secondary"
          (click)="captureProfilePhoto()"
          [disabled]="!hasCameraStream"
        >
          Capture
        </button>
        <button
          type="button"
          class="btn-secondary"
          (click)="retakeProfilePhoto()"
          [disabled]="!profilePhotoData"
        >
          Retake
        </button>
      </div>
      @if (cameraError) {
        <small class="error-text">{{ cameraError }}</small>
      }
      @if (!cameraError && !profilePhotoData) {
        <small>Position your face in the center and tap Capture.</small>
      }
    </div>

    <div class="modal-actions">
      <button type="button" class="btn-secondary" (click)="closeModal()">
        <span class="btn-icon-inline">✕</span>Cancel
      </button>
      <button type="button" class="btn-main" [disabled]="!profilePhotoData" (click)="useCapturedProfilePhoto()">
        <span class="btn-icon-inline">✓</span>Use Photo
      </button>
    </div>
  </div>
</div>
