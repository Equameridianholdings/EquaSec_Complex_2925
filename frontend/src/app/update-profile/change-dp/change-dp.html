<div class="modal-backdrop" (click)="closeModal()">
  <div
    class="modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="camera-title"
    (click)="$event.stopPropagation()"
  >
    <div class="modal-header">
      <h2 id="camera-title">Capture Profile Photo</h2>
      <button class="btn-icon" type="button" (click)="closeModal()">✕</button>
    </div>

    <div class="modal-body">
      <div class="camera-card">
        <video #profileCameraVideo class="camera-video" autoplay playsinline muted></video>
        <canvas #profileCameraCanvas class="camera-canvas"></canvas>
        @if (profilePhotoData()) {
          <img [src]="profilePhotoData()" alt="Profile preview" class="camera-preview" />
        }
        @if (hasCameraStream() && flashSupported()) {
          <button
            type="button"
            class="btn-flash"
            [class.btn-flash--on]="flashEnabled()"
            (click)="toggleFlash()"
            [attr.aria-label]="flashEnabled() ? 'Turn flash off' : 'Turn flash on'"
            [title]="flashEnabled() ? 'Turn flash off' : 'Turn flash on'"
          >
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20" aria-hidden="true">
              <path d="M7 2v11h3v9l7-12h-4l4-8z"/>
            </svg>
          </button>
        }
      </div>
      <div class="camera-actions">
        <button
          type="button"
          class="btn-secondary"
          (click)="startProfileCamera()"
          [disabled]="hasCameraStream()"
        >
          Start Camera
        </button>
        <button
          type="button"
          class="btn-secondary"
          (click)="captureProfilePhoto()"
          [disabled]="!hasCameraStream()"
        >
          Capture
        </button>
        <button
          type="button"
          class="btn-secondary"
          (click)="retakeProfilePhoto()"
          [disabled]="!profilePhotoData()"
        >
          Retake
        </button>
      </div>
      @if (cameraError()) {
        <small class="error-text">{{ cameraError() }}</small>
      }
      @if (!cameraError() && !profilePhotoData()) {
        <small>Position your face in the center and tap Capture.</small>
      }
    </div>

    <div class="modal-actions">
      <button type="button" class="btn-action btn-action--cancel" (click)="closeModal()">Cancel</button>
      <button type="button" class="btn-action btn-action--save" [disabled]="!profilePhotoData()" (click)="useCapturedProfilePhoto()">Use Photo</button>
    </div>
  </div>
</div>
